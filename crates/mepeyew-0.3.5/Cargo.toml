version = "0.3"

[dev-dependencies.stb_image_rust]
version = "2.27.2"

[dev-dependencies.winit]
version = "0.29.10"

[features]
default = [
    "vulkan",
    "webgpu",
    "surface_extension",
    "naga_translation",
]
naga_translation = ["dep:naga"]
surface_extension = ["dep:raw-window-handle"]
vulkan = [
    "dep:ash",
    "dep:gpu-allocator",
    "dep:raw-window-metal",
]
webgpu = [
    "dep:wasm-bindgen",
    "dep:web-sys",
    "dep:js-sys",
    "dep:wasm-bindgen-futures",
]


[package]
edition = "2021"
name = "mepeyew"
version = "0.3.5"
description = "mepeyew - Small But Powerful Graphics Library"
homepage = "https://github.com/davnotdev/mepeyew"
readme = "README.md"
keywords = [
    "gamedev",
    "graphics",
]
license = "BSD-2-Clause"
repository = "https://github.com/davnotdev/mepeyew"

[dependencies.naga]
version = "0.19"
features = [
    "glsl-in",
    "spv-in",
    "wgsl-in",
    "spv-out",
    "wgsl-out",
]
optional = true

[dependencies.raw-window-handle]

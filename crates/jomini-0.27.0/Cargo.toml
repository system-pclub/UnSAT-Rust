[package]
edition = "2018"
name = "jomini"
version = "0.27.0"
authors = ["Nick Babcock <nbabcock19@hotmail.com>"]
build = false
exclude = [
    "/.github",
    "/assets",
]
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Low level, performance oriented parser for save and game files from EU4, CK3, HOI4, Vic3, Imperator, and other PDS titles"
readme = "README.md"
keywords = [
    "eu4",
    "ck3",
    "ironman",
    "clausewitz",
]
categories = ["parsing"]
license = "MIT"
repository = "https://github.com/rakaly/jomini"

[package.metadata.docs.rs]
all-features = true

[profile.bench]
lto = true
codegen-units = 1
debug = 2

[profile.release]
lto = true
codegen-units = 1
debug = 2

[lib]
name = "jomini"
path = "src/lib.rs"

[[bin]]
name = "fmt"
path = "src/bin/fmt.rs"

[[bin]]
name = "json"
path = "src/bin/json.rs"
required-features = ["json"]

[[bin]]
name = "stats"
path = "src/bin/stats.rs"

[[bin]]
name = "tape_binary"
path = "src/bin/tape_binary.rs"

[[bin]]
name = "tape_text"
path = "src/bin/tape_text.rs"

[[bin]]
name = "token"
path = "src/bin/token.rs"

[[test]]
name = "de"
path = "tests/de.rs"

[[test]]
name = "tape"
path = "tests/tape.rs"

[[bench]]
name = "jomini_bench"
path = "benches/jomini_bench.rs"
harness = false

[dependencies.itoa]
version = "1.0"
optional = true

[dependencies.jomini_derive]
version = "^0.2.4"
optional = true

[dependencies.serde]
version = "1"
optional = true

[dependencies.serde_json]
version = "1"
optional = true

[dev-dependencies.attohttpc]
version = "0.28"
features = ["tls-vendored"]

[dev-dependencies.criterion]
version = "< 0.4"

[dev-dependencies.encoding_rs]
version = "0.8"

[dev-dependencies.flate2]
version = "1"

[dev-dependencies.quickcheck]
version = "1"

[dev-dependencies.quickcheck_macros]
version = "1"

[dev-dependencies.rstest]
version = "0.19.0"

[dev-dependencies.serde_with]
version = "3.8.1"

[features]
default = [
    "derive",
    "faster_writer",
]
derive = [
    "serde/derive",
    "jomini_derive",
]
faster_writer = ["dep:itoa"]
json = [
    "serde",
    "serde_json",
]

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = ["cfg(unoptimized_build)"]
